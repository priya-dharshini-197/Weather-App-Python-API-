<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        /* 🌤 Background */
        #bg {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: 1s;
        }

        .default { background: linear-gradient(to top, #56ccf2, #2f80ed); }
        .sunny { background: linear-gradient(to top, #ff9966, #ff5e62); }
        .night { background: linear-gradient(to top, #141e30, #243b55); }
        .rain { background: linear-gradient(to top, #4b6cb7, #182848); }

        /* ☁️ 3D Clouds */
        .cloud {
            position: absolute;
            width: 200px;
            height: 60px;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            filter: blur(1px);
            box-shadow:
                60px 20px 0 white,
                120px 10px 0 white,
                30px -10px 0 white,
                90px -15px 0 white;
            animation: moveClouds linear infinite;
        }

        .cloud1 {
            top: 20%;
            left: -200px;
            animation-duration: 30s;
        }

        .cloud2 {
            top: 40%;
            left: -250px;
            animation-duration: 45s;
        }

        @keyframes moveClouds {
            from { transform: translateX(0); }
            to { transform: translateX(130vw); }
        }

        /* 🌧 Rain */
        .rain-drop {
            position: absolute;
            width: 2px;
            height: 15px;
            background: white;
            opacity: 0.5;
            animation: rainFall linear infinite;
        }

        @keyframes rainFall {
            from { transform: translateY(-100vh); }
            to { transform: translateY(100vh); }
        }

        /* 💎 Glass Card */
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            margin: auto;
            margin-top: 120px;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 200px;
            outline: none;
        }

        button {
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
        }

        h1 {
            margin-top: 50px;
            font-size: 40px;
        }

        p {
            font-size: 18px;
        }
    </style>
</head>

<body>

<div id="bg" class="default"></div>

<!-- ☁️ Clouds -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<h1>🌦️ Weather App</h1>

<form>
    <input type="text" name="city" placeholder="Enter city">
    <button type="submit">Search</button>
</form>

{% if city %}
<div class="card">
    <p><strong>📍 City:</strong> {{ city }}</p>
    <p><strong>🌡 Temp:</strong> {{ temp }}°C</p>
    <p><strong>🌥 Condition:</strong> {{ condition }}</p>
    <p><strong>💧 Humidity:</strong> {{ humidity }}%</p>
    <p><strong>🌬 Wind:</strong> {{ wind }} km/h</p>
    <p><strong>🤒 Feels Like:</strong> {{ feels_like }}°C</p>
</div>
{% endif %}

<script>
    const condition = "{{ condition }}".toLowerCase();
    const bg = document.getElementById("bg");

    if (condition.includes("rain")) {
        bg.className = "rain";

        for (let i = 0; i < 80; i++) {
            let drop = document.createElement("div");
            drop.className = "rain-drop";
            drop.style.left = Math.random() * 100 + "vw";
            drop.style.animationDuration = (0.5 + Math.random()) + "s";
            document.body.appendChild(drop);
        }
    }
    else if (condition.includes("sun")) {
        bg.className = "sunny";
    }
    else if (condition.includes("clear") || condition.includes("night")) {
        bg.className = "night";
    }
    else {
        bg.className = "default";
    }
</script>

</body>
</html>
